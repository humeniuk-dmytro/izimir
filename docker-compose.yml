services:
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data
    environment:
      - DB_PATH=data/izimir.db
      - USER_SESSION=data/user_session
      - BOT_SESSION=data/bot_session
    stdin_open: true   # needed for the first login (phone number + code)
    tty: true

  # Mini App (FastAPI). Runs alongside the bot; shares the same SQLite (WAL).
  web:
    build: .
    restart: unless-stopped
    command: ["uv", "run", "--no-sync", "python", "-m", "izimir.webapp"]
    env_file: .env
    volumes:
      - ./data:/app/data
    environment:
      - DB_PATH=data/izimir.db
    expose:
      - "8000"

  # Free auto-HTTPS (Let's Encrypt) for the Mini App.
  # WEBAPP_DOMAIN — your DuckDNS subdomain, e.g. izimir.duckdns.org
  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${WEBAPP_DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
